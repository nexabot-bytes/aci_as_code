        first_name: Gold
        last_name: User
        phone: 555-0100
        domains:
        - name: all
          roles:
          - name: ops
            privilege_type: read         # non-defaut (write)
      ca_certificates:
      - name: GOLD-CA
        description: CA certificate golden
        certificate_chain: |-
          -----BEGIN CERTIFICATE-----
          MIIDRTCCAi2gAwIBAgIUYImmVYtjUfUakaxpgOC+b+S0wZQwDQYJKoZIhvcNAQEL
