        protocol: chap
        port: 4949                       # non-defaut (49)
        retries: 2
        timeout: 8
        mgmt_epg: oob
      users:
      - username: gold-user
        password: Placeholder123!        # REQUIS par le cablage, write-only (ignore_changes)
        description: User golden
