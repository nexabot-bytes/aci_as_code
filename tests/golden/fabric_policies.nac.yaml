apic:
  fabric_policies:
    aaa:
      # ── MODULES #96-#100 : AAA golden partiel — SECRETS OMIS (key/monitoring_password
      # ignore_changes ; pwd user = placeholder write-only ; certChain pkiTP = PUBLIC) ──
      radius_providers:
      - hostname_ip: 10.99.0.11
        description: RADIUS provider golden
        protocol: chap                   # non-defaut (pap)
        port: 1815                       # non-defaut (1812)
        retries: 3                       # non-defaut (1)
        timeout: 10                      # non-defaut (5)
        monitoring: true                 # non-defaut (false)
        monitoring_username: gold-monitor
        mgmt_epg: oob                    # non-defaut (inb)
      tacacs_providers:
      - hostname_ip: 10.99.0.12
